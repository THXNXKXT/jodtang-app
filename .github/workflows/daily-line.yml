name: Daily LINE Report

on:
  schedule:
    # 16:30 UTC = 23:30 ICT — off-peak, GitHub Actions schedule reliability drops at 00:00 UTC
    - cron: "30 16 * * *"
  workflow_dispatch: # manual trigger for testing

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit cron endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://jodtang-app.vercel.app/api/cron/daily"
