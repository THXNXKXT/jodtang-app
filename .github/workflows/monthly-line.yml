name: Monthly LINE Report

on:
  schedule:
    # 17:00 UTC on day 1 = 00:00 ICT on day 1
    - cron: "0 17 1 * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit cron endpoint
        run: |
          curl -fsS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://jodtang-app.vercel.app/api/cron/monthly"
