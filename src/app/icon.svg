<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ponytail: golden retriever pup — floppy ears, round face, readable at 16px -->

  <!-- Ears (floppy, hanging down sides) -->
  <ellipse cx="11" cy="22" rx="6" ry="12" fill="#d4a056" transform="rotate(-15 11 22)"/>
  <ellipse cx="37" cy="22" rx="6" ry="12" fill="#d4a056" transform="rotate(15 37 22)"/>

  <!-- Head -->
  <circle cx="24" cy="24" r="16" fill="#e8b878"/>

  <!-- Forehead fluff -->
  <path d="M18 13 Q24 10 30 13 Q28 16 24 16 Q20 16 18 13 Z" fill="#f0c890"/>

  <!-- Eyes -->
  <circle cx="18" cy="22" r="2.8" fill="#1e293b"/>
  <circle cx="30" cy="22" r="2.8" fill="#1e293b"/>
  <circle cx="19" cy="21" r="0.9" fill="white"/>
  <circle cx="31" cy="21" r="0.9" fill="white"/>

  <!-- Cheeks -->
  <ellipse cx="14" cy="28" rx="2.5" ry="1.8" fill="#e89878" opacity="0.5"/>
  <ellipse cx="34" cy="28" rx="2.5" ry="1.8" fill="#e89878" opacity="0.5"/>

  <!-- Snout -->
  <ellipse cx="24" cy="30" rx="6" ry="5" fill="#f5dcb0"/>

  <!-- Nose -->
  <ellipse cx="24" cy="28" rx="2.2" ry="1.6" fill="#1e293b"/>

  <!-- Mouth -->
  <path d="M24 30 L24 33" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M24 33 Q20 35 18 33" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M24 33 Q28 35 30 33" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Tongue -->
  <ellipse cx="24" cy="35" rx="2" ry="1.3" fill="#f472b6" opacity="0.8"/>
</svg>
